name: Deploy PWA to GitHub Pages

on:
  push:
    branches:
      - main
      - PWA
      - master
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build SvelteKit PWA
        run: |
          # Set BASE_PATH to repository name for GitHub Pages default subpath (e.g. /hostess)
          export BASE_PATH="/${{ github.event.repository.name }}"
          echo "Building PWA with BASE_PATH=$BASE_PATH"
          npm run build

      - name: Set up client-side fallback route
        run: |
          # Copy 200.html to 404.html so GitHub Pages serves it for client-side routes,
          # allowing direct loading and page refreshing of SPA routes.
          cp build/200.html build/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
